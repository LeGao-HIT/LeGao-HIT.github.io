# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Le Gao(高乐)
first_name: Le
middle_name:
last_name: Gao
contact_note: >
  For academic collaboration, please contact me by email.
description: >
  Academic homepage of Le Gao, a Ph.D. candidate at Harbin Institute of Technology working on
  physics-informed machine learning, reliability prediction, and remaining useful life estimation
  for power electronic devices.
footer_text:
keywords: power electronics, reliability prediction, remaining useful life, physics-informed machine learning, SiC MOSFET, power devices
lang: en
icon: LG

url: https://legao-hit.github.io
baseurl: ""
last_updated: false
impressum_path:
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  upgrade:
    channel: stable
    auto_apply_safe_fixes: false

navbar_fixed: true
footer_fixed: false
max_width: 930px

serve_og_meta: false
serve_schema_org: false
og_image:

analytics:
  google:
  cronitor:
  pirsch:
  openpanel:

google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - Gemfile
  - LICENSE
  - vendor
keep_files:
  - CNAME
  - .nojekyll

theme: al_folio_core

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-sitemap
  - jekyll-scholar
  - jekyll-socials
  - jekyll-terser
  - al_folio_core
  - al_icons
  - al_img_tools

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

jekyll-minifier:
  compress_javascript: false
  compress_css: false
  exclude: ["robots.txt"]

terser:
  compress:
    drop_console: true

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

imagemagick:
  enabled: true
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".gif"
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true

enable_google_verification: false
enable_bing_verification: false
enable_cookie_consent: false
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_medium_zoom: true
enable_progressbar: true

third_party_libraries:
  download: false
  fontawesome:
    integrity:
      css: "sha256-MVopmdyC2tYTiJ8wlktf0uh0v4NgT+vNdyVFepi7Q0c="
    url:
      css: "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@{{version}}/css/all.min.css"
    version: "7.2.0"
  academicons:
    integrity:
      css: "sha256-SzrCOBJbGVFMahewkgjwnApaV2+av1DwMAA+/QGLyZw="
    url:
      css: "https://cdn.jsdelivr.net/npm/academicons@{{version}}/css/academicons.min.css"
    version: "1.9.5"
  google_fonts:
    url:
      fonts: "https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons&display=swap"
  vanilla-back-to-top:
    integrity:
      js: "sha256-uMJJ3EoTyfRBoTbR+lrfu1uRQ87RZG8AR3cVNuQVeFg="
    url:
      js: "https://cdn.jsdelivr.net/npm/vanilla-back-to-top@{{version}}/dist/vanilla-back-to-top.min.js"
    version: "7.2.1"
